name: Dev Branch Build

on:
  push:
    branches:
      - dev

jobs:
  build-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        run: |
          # Get current version from Version.cs
          CURRENT_VERSION=$(grep 'AppVersion =' src/Version.cs | sed 's/.*"\(.*\)".*/\1/')
          echo "Current version: $CURRENT_VERSION"

          # Add build number and dev suffix
          BUILD_NUMBER=${{ github.run_number }}
          DEV_VERSION="$CURRENT_VERSION.$BUILD_NUMBER-dev"

          echo "Dev version: $DEV_VERSION"
          echo "version=$DEV_VERSION" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy Frontend to wwwroot
        run: |
          rm -rf src/wwwroot/assets src/wwwroot/index.html
          mkdir -p src/wwwroot/assets
          cp -r _output/UI/* src/wwwroot/
          echo "Frontend files copied to src/wwwroot:"
          ls -la src/wwwroot/

      - name: Build Windows x64
        run: |
          dotnet publish src/Sportarr.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:SkipFrontendBuild=true -p:Version=${{ steps.version.outputs.version }} -o publish/win-x64
          cd publish/win-x64 && zip -r ../../Sportarr-win-x64-${{ steps.version.outputs.version }}.zip .

      - name: Upload Windows build for installer
        uses: actions/upload-artifact@v4
        with:
          name: win-x64-build
          path: publish/win-x64/
          retention-days: 1

      - name: Upload installer assets
        uses: actions/upload-artifact@v4
        with:
          name: installer-assets
          path: |
            installer/
            Logo/
            COPYRIGHT.md
          retention-days: 1

      - name: Build Linux x64
        run: |
          dotnet publish src/Sportarr.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:SkipFrontendBuild=true -p:Version=${{ steps.version.outputs.version }} -o publish/linux-x64
          cd publish/linux-x64 && tar -czvf ../../Sportarr-linux-x64-${{ steps.version.outputs.version }}.tar.gz .

      - name: Build Linux ARM64
        run: |
          dotnet publish src/Sportarr.csproj -c Release -r linux-arm64 --self-contained true -p:PublishSingleFile=true -p:SkipFrontendBuild=true -p:Version=${{ steps.version.outputs.version }} -o publish/linux-arm64
          cd publish/linux-arm64 && tar -czvf ../../Sportarr-linux-arm64-${{ steps.version.outputs.version }}.tar.gz .

      - name: Build macOS x64
        run: |
          dotnet publish src/Sportarr.csproj -c Release -r osx-x64 --self-contained true -p:PublishSingleFile=true -p:SkipFrontendBuild=true -p:Version=${{ steps.version.outputs.version }} -o publish/osx-x64
          cd publish/osx-x64 && tar -czvf ../../Sportarr-osx-x64-${{ steps.version.outputs.version }}.tar.gz .

      - name: Build macOS ARM64 (Apple Silicon)
        run: |
          dotnet publish src/Sportarr.csproj -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -p:SkipFrontendBuild=true -p:Version=${{ steps.version.outputs.version }} -o publish/osx-arm64
          cd publish/osx-arm64 && tar -czvf ../../Sportarr-osx-arm64-${{ steps.version.outputs.version }}.tar.gz .

      # Plugin builds (Jellyfin / Emby / Plex Legacy) mirror what the stable
      # release workflow does so dev testers can grab a matching plugin
      # without waiting for a main cut. The dev plugins are attached to the
      # rolling "Development Build" GitHub Release as direct-download zips.
      # We deliberately do NOT update agents/jellyfin/manifest.json the way
      # the stable workflow does -- that file is the public Jellyfin plugin
      # catalog and pointing it at dev zips would silently push prereleases
      # to every stable user's auto-update path.
      #
      # AssemblyVersion / FileVersion must be 4-part numeric (Major.Minor.Build.Revision),
      # so we derive a numeric version (base + GitHub run number) for those
      # fields and use the dev-suffixed version for the zip filename and the
      # meta.json that ships inside the package.
      - name: Build Jellyfin Plugin (dev)
        run: |
          BASE_VERSION=$(grep 'AppVersion =' src/Version.cs | sed 's/.*"\(.*\)".*/\1/')
          NUMERIC_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          DEV_VERSION="${{ steps.version.outputs.version }}"
          cd agents/jellyfin/Sportarr
          sed -i "s|<Version>.*</Version>|<Version>${BASE_VERSION}</Version>|" Sportarr.csproj
          sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>${NUMERIC_VERSION}</AssemblyVersion>|" Sportarr.csproj
          sed -i "s|<FileVersion>.*</FileVersion>|<FileVersion>${NUMERIC_VERSION}</FileVersion>|" Sportarr.csproj
          python3 -c "
          import json
          with open('meta.json', 'r') as f:
            meta = json.load(f)
          meta['version'] = '${DEV_VERSION}'
          meta['timestamp'] = '$(date -u +%Y-%m-%dT%H:%M:%SZ)'
          with open('meta.json', 'w') as f:
            json.dump(meta, f, indent=2)
            f.write('\n')
          "
          dotnet restore Sportarr.csproj
          dotnet publish Sportarr.csproj -c Release -o publish
          cd publish
          zip -j ../sportarr-jellyfin-plugin_${DEV_VERSION}.zip Jellyfin.Plugin.Sportarr.dll meta.json
          cd ..
          mv sportarr-jellyfin-plugin_${DEV_VERSION}.zip ../../../

      - name: Build Emby Plugin (dev)
        run: |
          BASE_VERSION=$(grep 'AppVersion =' src/Version.cs | sed 's/.*"\(.*\)".*/\1/')
          NUMERIC_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          DEV_VERSION="${{ steps.version.outputs.version }}"
          cd agents/emby/Sportarr
          sed -i "s|<Version>.*</Version>|<Version>${BASE_VERSION}</Version>|" Sportarr.csproj
          sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>${NUMERIC_VERSION}</AssemblyVersion>|" Sportarr.csproj
          sed -i "s|<FileVersion>.*</FileVersion>|<FileVersion>${NUMERIC_VERSION}</FileVersion>|" Sportarr.csproj
          dotnet restore Sportarr.csproj
          dotnet publish Sportarr.csproj -c Release -o publish
          cd publish
          zip -j ../sportarr-emby-plugin_${DEV_VERSION}.zip Emby.Plugins.Sportarr.dll
          cd ..
          mv sportarr-emby-plugin_${DEV_VERSION}.zip ../../../

      - name: Build Plex Legacy Bundle (dev)
        run: |
          DEV_VERSION="${{ steps.version.outputs.version }}"
          cd agents/plex
          zip -r ../../sportarr-plex-legacy-plugin_${DEV_VERSION}.zip Sportarr-Legacy.bundle

      # GitHub caps a single release at 1000 assets. The dev "Development
      # Build" release is auto-overwritten on every push, so over time we
      # accumulate artifact uploads until softprops/action-gh-release fails
      # with `file_count limited to 1000 assets per release`. Delete the
      # release (keep the tag — softprops will reattach it) before each push
      # so the asset count starts back at zero. continue-on-error so a
      # first-time run with no existing release doesn't fail the workflow.
      - name: Clear stale dev-release assets
        run: gh release delete dev --yes --repo "${{ github.repository }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # The git `dev` tag has to track the dev branch so the Releases
      # page, downstream tooling, and any local clone (IDEs computing
      # tag-vs-branch diffs included) all see the rolling tag at the
      # current commit. softprops/action-gh-release attaches the
      # release to whatever commit the tag currently points at and
      # ignores target_commitish when the tag already exists, so we
      # force-move the tag here before softprops runs. Force-pushing a
      # lightweight tag is safe: no commits get orphaned, and the
      # GitHub Release body / assets are recreated on every workflow
      # run regardless.
      - name: Move dev tag to current commit
        run: |
          git tag -f dev "${GITHUB_SHA}"
          git push origin refs/tags/dev --force

      - name: Update dev prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build
          body: |
            ## Development Build - ${{ steps.version.outputs.version }}

            **This is a development build for testing purposes.**

            This release is automatically updated with each push to the dev branch.

            ### Docker
            ```
            docker pull sportarr/sportarr:dev
            ```

            ### Downloads
            - **Windows Installer (recommended)**: Sportarr-Setup-${{ steps.version.outputs.version }}.exe
            - **Windows x64 (portable)**: Sportarr-win-x64-${{ steps.version.outputs.version }}.zip
            - **Linux x64**: Sportarr-linux-x64-${{ steps.version.outputs.version }}.tar.gz
            - **Linux ARM64**: Sportarr-linux-arm64-${{ steps.version.outputs.version }}.tar.gz
            - **macOS x64**: Sportarr-osx-x64-${{ steps.version.outputs.version }}.tar.gz
            - **macOS ARM64**: Sportarr-osx-arm64-${{ steps.version.outputs.version }}.tar.gz

            ### Media-server plugins (manual install only; not in the public catalog)
            - **Jellyfin**: sportarr-jellyfin-plugin_${{ steps.version.outputs.version }}.zip
            - **Emby**: sportarr-emby-plugin_${{ steps.version.outputs.version }}.zip
            - **Plex (legacy bundle)**: sportarr-plex-legacy-plugin_${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: true
          files: |
            Sportarr-win-x64-${{ steps.version.outputs.version }}.zip
            Sportarr-linux-x64-${{ steps.version.outputs.version }}.tar.gz
            Sportarr-linux-arm64-${{ steps.version.outputs.version }}.tar.gz
            Sportarr-osx-x64-${{ steps.version.outputs.version }}.tar.gz
            Sportarr-osx-arm64-${{ steps.version.outputs.version }}.tar.gz
            sportarr-jellyfin-plugin_${{ steps.version.outputs.version }}.zip
            sportarr-emby-plugin_${{ steps.version.outputs.version }}.zip
            sportarr-plex-legacy-plugin_${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build framework-dependent (non-self-contained) for Docker
      # These produce Sportarr.dll that runs on the aspnet runtime already in the Docker image
      # Cross-compiles natively on amd64 runner — no QEMU needed for the dotnet build
      - name: Build Docker binaries (linux-x64 + linux-arm64)
        run: |
          dotnet publish src/Sportarr.csproj -c Release -r linux-x64 --self-contained false -p:PublishSingleFile=false -p:SkipFrontendBuild=true -p:Version=${{ steps.version.outputs.version }} -o publish/docker-linux-x64
          dotnet publish src/Sportarr.csproj -c Release -r linux-arm64 --self-contained false -p:PublishSingleFile=false -p:SkipFrontendBuild=true -p:Version=${{ steps.version.outputs.version }} -o publish/docker-linux-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            sportarr/sportarr:dev
            sportarr/sportarr:${{ steps.version.outputs.version }}
          # Pull the latest base + bust the apt layer so dev images get current
          # Debian security patches instead of a stale cached base/apt layer.
          pull: true
          build-args: |
            SPORTARR_BRANCH=dev
            CACHEBUST=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1

      - name: Send Discord notification
        if: ${{ success() && vars.DISCORD_NOTIFICATIONS_ENABLED != 'false' && env.WEBHOOK_URL != '' }}
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Get the commit that triggered this build
          COMMIT_MSG=$(git log --pretty=format:"%s" -1 | sed 's/"/\\"/g')
          COMMIT_SHA=$(git rev-parse --short HEAD)

          DESCRIPTION="**Development Build**\n• ${COMMIT_MSG}\n\n**Docker Installation**\n\`\`\`\ndocker pull sportarr/sportarr:dev\n\`\`\`\n\n**Downloads**\n[View all platform downloads](https://github.com/${{ github.repository }}/releases/tag/dev)"

          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"username\": \"Sportarr Dev\",
              \"embeds\": [{
                \"title\": \"Dev Build - ${VERSION}\",
                \"description\": \"$DESCRIPTION\",
                \"color\": 16776960,
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"
              }]
            }"

  # Windows Installer Job - builds .exe installer using Inno Setup so dev
  # users get the same one-click update experience as stable. Runs after
  # build-dev so the dev release already exists; this job appends the .exe
  # to it. ISCC's VersionInfoVersion field rejects the -dev suffix, so the
  # version is stripped for compilation and the output file is renamed
  # back to include -dev for the download artifact.
  build-windows-installer:
    needs: build-dev
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: win-x64-build
          path: publish/win-x64

      - name: Download installer assets
        uses: actions/download-artifact@v4
        with:
          name: installer-assets
          path: .

      - name: Create ICO file from PNG
        shell: pwsh
        run: |
          choco install imagemagick -y --no-progress
          refreshenv

          $env:Path = "C:\Program Files\ImageMagick-7.1.1-Q16-HDRI;$env:Path"
          magick Logo/256.png Logo/128.png Logo/64.png Logo/48.png Logo/32.png Logo/16.png Logo/sportarr.ico

          Write-Host "Created sportarr.ico"
          Get-Item Logo/sportarr.ico

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          Write-Host "Inno Setup installed"

      - name: Build Windows Installer
        shell: pwsh
        run: |
          $devVersion = "${{ needs.build-dev.outputs.version }}"
          # Strip -dev suffix: ISCC's VersionInfoVersion requires a numeric
          # x.x.x.x format and rejects pre-release suffixes.
          $numericVersion = $devVersion -replace '-dev$', ''
          Write-Host "Dev version: $devVersion"
          Write-Host "Numeric version for ISCC: $numericVersion"

          New-Item -ItemType Directory -Force -Path installer-output

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$numericVersion installer/sportarr.iss

          # Rename so the dev installer is clearly distinguishable from stable.
          Move-Item "installer-output/Sportarr-Setup-$numericVersion.exe" "installer-output/Sportarr-Setup-$devVersion.exe"

          Write-Host "Installer built successfully"
          Get-ChildItem installer-output/

      - name: Upload installer to dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          prerelease: true
          files: |
            installer-output/Sportarr-Setup-${{ needs.build-dev.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
